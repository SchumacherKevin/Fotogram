<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fotogram.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=PT+Sans&display=swap"
        rel="stylesheet">
    <script src="fotogram.js" defer> </script>
    <link rel="icon" type="icon" href="assets/icons/favicon.png">
    <title>Fotogram</title>
</head>

<body>

    <header id="header_main">
        <div id="header_logo" class="max_width">

        </div>
    </header>
    <main>
        <div id="main_content">
            <h1 class="main_caption max_width">Your personal photo album </h1>
            <div  id="main_images" class="max_width">

            </div>
        </div>
        <dialog id="dialog_main" onclick="if(event.target===this) this.close()">

        </dialog>
    </main>
    <footer id="footer_main">
        <div id="footer_logo" class="max_width shape">

        </div>
    </footer>

</body>

</html>
